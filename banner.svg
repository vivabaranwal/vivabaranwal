<svg width="1200" height="180" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- background gradient -->
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0d1117"/>
<stop offset="100%" stop-color="#05070c"/>
</linearGradient>

<!-- neon gradient -->
<linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#ff2fa3"/>
<stop offset="50%" stop-color="#ff6ec7"/>
<stop offset="100%" stop-color="#8a2be2"/>
</linearGradient>

<!-- grid pattern -->
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40 0 L0 0 0 40" fill="none"
stroke="#ff2fa3" stroke-opacity="0.12"/>
</pattern>

<!-- glow -->
<filter id="glow">
<feGaussianBlur stdDeviation="4" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<!-- background -->
<rect width="100%" height="180" fill="url(#bg)"/>
<rect width="100%" height="180" fill="url(#grid)"/>

<!-- center processor node -->
<circle cx="600" cy="95" r="6" fill="#ff2fa3" filter="url(#glow)"/>

<!-- main horizontal circuit -->
<line x1="0" y1="95" x2="1200" y2="95"
stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>

<!-- incoming vertical traces -->
<line x1="200" y1="0" x2="200" y2="95"
stroke="#ff2fa3" stroke-width="2"/>
<line x1="400" y1="180" x2="400" y2="95"
stroke="#ff6ec7" stroke-width="2"/>
<line x1="800" y1="0" x2="800" y2="95"
stroke="#ff6ec7" stroke-width="2"/>
<line x1="1000" y1="180" x2="1000" y2="95"
stroke="#8a2be2" stroke-width="2"/>

<!-- diagonal traces -->
<line x1="0" y1="20" x2="200" y2="95"
stroke="#ff2fa3" stroke-width="2"/>
<line x1="1200" y1="20" x2="1000" y2="95"
stroke="#8a2be2" stroke-width="2"/>
<line x1="0" y1="160" x2="200" y2="95"
stroke="#ff6ec7" stroke-width="2"/>
<line x1="1200" y1="160" x2="1000" y2="95"
stroke="#ff6ec7" stroke-width="2"/>

<!-- circuit nodes -->
<circle cx="200" cy="95" r="4" fill="#ff2fa3"/>
<circle cx="400" cy="95" r="4" fill="#ff6ec7"/>
<circle cx="800" cy="95" r="4" fill="#ff6ec7"/>
<circle cx="1000" cy="95" r="4" fill="#8a2be2"/>

<!-- moving pulse -->
<circle r="5" fill="#ffffff" filter="url(#glow)">
<animateMotion dur="5s" repeatCount="indefinite"
path="M0 95 L1200 95"/>
</circle>

<!-- name -->
<text x="600" y="65"
text-anchor="middle"
font-family="JetBrains Mono"
font-size="42"
fill="url(#neon)"
filter="url(#glow)">
Viva Baranwal
</text>

</svg>
